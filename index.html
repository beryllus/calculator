<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>

<body>
    <div class="calculator">
        <div class="display">
            <p class="result">0</p>
        </div>
        <div class="keyboard">
            <div class="left">
                <div class="row">
                    <button type="button" class="action orange" id="clear">C</button>
                    <button type="button" class="action orange" id="delete">DEL</button>
                    <button type="button" class="operator orange" id="divide">÷</button>
                </div>
                <div class="row">
                    <button type="button" class="number blue" id="7">7</button>
                    <button type="button" class="number blue" id="8">8</button>
                    <button type="button" class="number blue" id="9">9</button>
                </div>
                <div class="row">
                    <button type="button" class="number blue" id="4">4</button>
                    <button type="button" class="number blue" id="5">5</button>
                    <button type="button" class="number blue" id="6">6</button>
                </div>
                <div class="row">
                    <button type="button" class="number blue" id="1">1</button>
                    <button type="button" class="number blue" id="2">2</button>
                    <button type="button" class="number blue" id="3">3</button>
                </div>
                <div class="row">
                    <button type="button" class="number blue" id="zero">0</button>
                    <button type="button" class="special blue" id="dot">.</button>
                </div>
            </div>
            <div class="right">
                <button type="button" class="operator orange" id="multiply">×</button>
                <button type="button" class="operator orange" id="subtract">-</button>
                <button type="button" class="operator orange" id="add">+</button>
                <button type="button" class="action orange" id="equals">=</button>
            </div>

        </div>
    </div>

</body>

</html>
